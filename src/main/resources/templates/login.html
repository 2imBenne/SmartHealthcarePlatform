<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Smart Healthcare</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 for beautiful popups -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex items-center justify-center p-4 font-sans">

    <!-- Card container -->
    <div class="w-full max-w-md bg-white p-8 rounded-xl border border-slate-200 shadow-lg space-y-6">
        
        <!-- Logo/Header -->
        <div class="text-center space-y-2">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-sky-600 flex items-center justify-center text-white font-title font-bold text-lg">
                    S
                </div>
                <span class="text-lg font-title font-bold tracking-tight text-slate-900">Smart<span class="text-sky-600">Healthcare</span></span>
            </a>
            <h2 class="text-2xl font-title font-bold tracking-tight text-slate-900">Chào Mừng Trở Lại!</h2>
            <p class="text-sm text-slate-500">Đăng nhập tài khoản y tế số của bạn</p>
        </div>

        <!-- Alert Message Container -->
        <div id="errorAlert" class="hidden bg-rose-50 text-rose-600 p-4 rounded-lg text-sm font-medium border border-rose-100 transition-all">
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div class="space-y-1">
                <label for="email" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm"
                       placeholder="example@healthcare.com">
            </div>

            <div class="space-y-1">
                <div class="flex justify-between">
                    <label for="password" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Mật Khẩu</label>
                </div>
                <input type="password" id="password" required
                       class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm"
                       placeholder="••••••••">
            </div>

            <button type="submit"
                    class="w-full py-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg shadow-sm transition-all hover:shadow mt-2 text-sm">
                Đăng Nhập
            </button>
        </form>

        <!-- Redirect to register -->
        <p class="text-center text-sm text-slate-500">
            Chưa có tài khoản? 
            <a href="/register" class="text-sky-600 font-semibold hover:underline">Đăng ký ngay</a>
        </p>

    </div>

    <!-- Login JS Logic -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');

            errorAlert.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Email hoặc mật khẩu không chính xác!');
                }

                // 1. Lưu JWT vào Cookie để dùng cho Thymeleaf load trang tiếp theo
                document.cookie = "jwt=" + data.token + "; path=/; max-age=36000";

                // Hiển thị Popup thành công và điều hướng
                Swal.fire({
                    title: 'Đăng nhập thành công!',
                    text: 'Đang chuyển hướng đến bảng điều khiển...',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    if (data.role === 'ROLE_PATIENT') {
                        window.location.href = '/patient/dashboard';
                    } else if (data.role === 'ROLE_DOCTOR') {
                        window.location.href = '/doctor/dashboard';
                    } else if (data.role === 'ROLE_ADMIN') {
                        window.location.href = '/admin/dashboard';
                    } else {
                        window.location.href = '/';
                    }
                });

            } catch (err) {
                Swal.fire({
                    title: 'Đăng nhập thất bại',
                    text: err.message,
                    icon: 'error',
                    confirmButtonColor: '#e11d48'
                });
            }
        });
    </script>

</body>
</html>
