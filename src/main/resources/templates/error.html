<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi — Smart Healthcare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#f8fafc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .err-card{text-align:center;max-width:420px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:48px 36px;
            box-shadow:0 10px 40px rgba(0,0,0,.06)}
        .err-code{font-family:'Outfit',sans-serif;font-size:72px;font-weight:900;
            background:linear-gradient(135deg,#06b6d4,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .err-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:#0f172a;margin:8px 0}
        .err-desc{font-size:14px;color:#64748b;margin-bottom:28px;line-height:1.6}
        .btn-home{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:10px;border:none;
            background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff;font-size:14px;font-weight:600;
            cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 12px rgba(6,182,212,.25)}
        .btn-home:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(6,182,212,.35)}
    </style>
</head>
<body>
<div class="err-card">
    <div class="err-code" th:text="${errorCode != null ? errorCode : '404'}">404</div>
    <div class="err-title">Đã xảy ra lỗi</div>
    <p class="err-desc">Trang bạn tìm kiếm không tồn tại hoặc bạn không có quyền truy cập.</p>
    <a href="/" class="btn-home">← Về Trang Chủ</a>
</div>
</body>
</html>
