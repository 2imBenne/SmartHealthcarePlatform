<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký — Smart Healthcare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',sans-serif;background:#f0fdfa;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .reg-card{width:100%;max-width:480px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:40px 36px;
            box-shadow:0 10px 40px rgba(0,0,0,.06)}
        .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
        .logo-ic{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#06b6d4,#8b5cf6);
            display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;color:#fff;
            box-shadow:0 4px 12px rgba(6,182,212,.25)}
        .logo-tx{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;color:#0f172a}
        .logo-tx span{color:#06b6d4}
        h1{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;color:#0f172a}
        .sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:24px}
        .form-group{margin-bottom:16px}
        .form-label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
        .form-input{width:100%;padding:10px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;
            font-size:13px;color:#0f172a;outline:none;transition:all .2s;font-family:'Inter',sans-serif}
        .form-input:focus{border-color:#06b6d4;box-shadow:0 0 0 3px rgba(6,182,212,.1)}
        .form-input::placeholder{color:#94a3b8}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

        /* Role Selector */
        .role-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
        .role-opt{position:relative}
        .role-opt input{position:absolute;opacity:0}
        .role-opt label{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 12px;
            background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:all .2s;text-align:center}
        .role-opt label:hover{border-color:#06b6d4}
        .role-opt input:checked + label{border-color:#06b6d4;background:rgba(6,182,212,.06);
            box-shadow:0 0 0 3px rgba(6,182,212,.1)}
        .role-opt .role-icon{font-size:28px}
        .role-opt .role-name{font-size:13px;font-weight:700;color:#0f172a}
        .role-opt .role-desc{font-size:11px;color:#94a3b8}

        .btn-submit{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff;
            background:linear-gradient(135deg,#0891b2,#06b6d4);cursor:pointer;transition:all .2s;
            box-shadow:0 4px 12px rgba(6,182,212,.25)}
        .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(6,182,212,.35)}
        .link-row{text-align:center;margin-top:20px;font-size:13px;color:#64748b}
        .link-row a{color:#06b6d4;text-decoration:none;font-weight:600}
        .link-row a:hover{text-decoration:underline}
    </style>
</head>
<body>

<div class="reg-card">
    <div class="logo"><div class="logo-ic">S</div><span class="logo-tx">Smart<span>Healthcare</span></span></div>
    <h1>Tạo Tài Khoản</h1>
    <p class="sub">Tham gia hệ thống Y tế số thông minh.</p>
    <form id="registerForm">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Họ và tên</label>
                <input type="text" id="regName" required class="form-input" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label class="form-label">Số điện thoại</label>
                <input type="text" id="regPhone" class="form-input" placeholder="0901 234 567">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="regEmail" required class="form-input" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Mật khẩu</label>
            <input type="password" id="regPassword" required minlength="6" class="form-input" placeholder="Tối thiểu 6 ký tự">
        </div>
        <div class="form-group">
            <label class="form-label">Chọn vai trò</label>
            <div class="role-group">
                <div class="role-opt">
                    <input type="radio" name="role" value="PATIENT" id="rolePatient" checked>
                    <label for="rolePatient"><span class="role-icon">🩺</span><span class="role-name">Bệnh Nhân</span><span class="role-desc">Đặt lịch & khám bệnh</span></label>
                </div>
                <div class="role-opt">
                    <input type="radio" name="role" value="DOCTOR" id="roleDoctor">
                    <label for="roleDoctor"><span class="role-icon">👨‍⚕️</span><span class="role-name">Bác Sĩ</span><span class="role-desc">Khám & kê đơn thuốc</span></label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn-submit">Đăng Ký →</button>
    </form>
    <div class="link-row">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const role = document.querySelector('input[name="role"]:checked').value;
        try {
            const res = await fetch('/api/auth/register', {method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('regEmail').value,
                    password: document.getElementById('regPassword').value,
                    fullName: document.getElementById('regName').value,
                    phoneNumber: document.getElementById('regPhone').value,
                    role
                })
            });
            if (!res.ok) { const d = await res.json(); throw new Error(d.message || 'Đăng ký thất bại.'); }
            Swal.fire({title:'Đăng ký thành công!',text:'Chuyển đến trang đăng nhập...',icon:'success',
                confirmButtonColor:'#06b6d4',timer:2000,showConfirmButton:false}).then(() => window.location.href = '/login');
        } catch(err) {
            Swal.fire({title:'Lỗi',text:err.message,icon:'error',confirmButtonColor:'#06b6d4'});
        }
    });
</script>
</body>
</html>
