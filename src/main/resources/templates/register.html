<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Smart Healthcare</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 for beautiful popups -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        title: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex items-center justify-center p-4 font-sans">

    <!-- Card container -->
    <div class="w-full max-w-lg bg-white p-8 rounded-xl border border-slate-200 shadow-lg space-y-6">
        
        <!-- Logo/Header -->
        <div class="text-center space-y-2">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-sky-600 flex items-center justify-center text-white font-title font-bold text-lg">
                    S
                </div>
                <span class="text-lg font-title font-bold tracking-tight text-slate-900">Smart<span class="text-sky-600">Healthcare</span></span>
            </a>
            <h2 class="text-2xl font-title font-bold tracking-tight text-slate-900">Tạo Tài Khoản Mới</h2>
            <p class="text-sm text-slate-500">Cùng đồng hành chăm sóc sức khỏe toàn diện</p>
        </div>

        <!-- Alerts -->
        <div id="errorAlert" class="hidden bg-rose-50 text-rose-600 p-4 rounded-lg text-sm font-medium border border-rose-100 transition-all"></div>
        <div id="successAlert" class="hidden bg-emerald-50 text-emerald-600 p-4 rounded-lg text-sm font-medium border border-emerald-100 transition-all"></div>

        <!-- Register Form -->
        <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="space-y-1 md:col-span-2">
                <label for="fullName" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Họ Và Tên</label>
                <input type="text" id="fullName" required
                       class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm"
                       placeholder="Nguyễn Văn A">
            </div>

            <div class="space-y-1">
                <label for="email" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm"
                       placeholder="example@healthcare.com">
            </div>

            <div class="space-y-1">
                <label for="phoneNumber" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Số Điện Thoại</label>
                <input type="tel" id="phoneNumber" required
                       class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm"
                       placeholder="0912345678">
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Mật Khẩu</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm"
                       placeholder="••••••••">
            </div>

            <div class="space-y-1">
                <label for="role" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Bạn là ai?</label>
                <select id="role" required
                        class="w-full px-4 py-2.5 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-sky-500 focus:border-sky-500 transition-all text-sm">
                    <option value="PATIENT">Bệnh Nhân (Patient)</option>
                    <option value="DOCTOR">Bác Sĩ (Doctor)</option>
                </select>
            </div>

            <button type="submit"
                    class="md:col-span-2 w-full py-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold rounded-lg shadow-sm transition-all hover:shadow mt-2 text-sm">
                Đăng Ký
            </button>
        </form>

        <!-- Redirect to login -->
        <p class="text-center text-sm text-slate-500">
            Đã có tài khoản? 
            <a href="/login" class="text-sky-600 font-semibold hover:underline">Đăng nhập ngay</a>
        </p>

    </div>

    <!-- JS Logic -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.classList.add('hidden');
            successAlert.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fullName, email, phoneNumber, password, role })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Lỗi đăng ký tài khoản!');
                }
                Swal.fire({
                    title: 'Thành công!',
                    text: 'Đăng ký tài khoản thành công! Đang chuyển hướng...',
                    icon: 'success',
                    timer: 2000,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = '/login';
                });

            } catch (err) {
                Swal.fire({
                    title: 'Lỗi đăng ký',
                    text: err.message,
                    icon: 'error',
                    confirmButtonColor: '#e11d48'
                });
            }
        });
    </script>

</body>
</html>
