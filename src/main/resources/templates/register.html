<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Smart Healthcare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Be Vietnam Pro',sans-serif;background:#f0fdfa;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .reg-card{width:100%;max-width:480px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:40px 36px;box-shadow:0 10px 40px rgba(0,0,0,.06)}
        .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
        .logo-ic{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#06b6d4,#8b5cf6);display:flex;align-items:center;justify-content:center;font-family:'Be Vietnam Pro',sans-serif;font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 12px rgba(6,182,212,.25)}
        .logo-tx{font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:18px;color:#0f172a}
        .logo-tx span{color:#06b6d4}
        h1{font-family:'Be Vietnam Pro',sans-serif;font-size:22px;font-weight:800;text-align:center;margin-bottom:6px;color:#0f172a}
        .sub{text-align:center;font-size:13px;color:#64748b;margin-bottom:24px}
        .form-group{margin-bottom:16px}
        .form-label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
        .form-input{width:100%;padding:10px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;color:#0f172a;outline:none;transition:all .2s;font-family:'Be Vietnam Pro',sans-serif}
        .form-input:focus{border-color:#06b6d4;box-shadow:0 0 0 3px rgba(6,182,212,.1)}
        .form-input::placeholder{color:#94a3b8}
        .password-wrap{position:relative}
        .password-wrap .form-input{padding-right:44px}
        .toggle-pass{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:30px;height:30px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b}
        .toggle-pass:hover{color:#0f172a}
        .toggle-pass svg{width:18px;height:18px;display:block}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

        .role-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
        .role-opt{position:relative}
        .role-opt input{position:absolute;opacity:0}
        .role-opt label{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 12px;background:#f8fafc;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:all .2s;text-align:center}
        .role-opt label:hover{border-color:#06b6d4}
        .role-opt input:checked + label{border-color:#06b6d4;background:rgba(6,182,212,.06);box-shadow:0 0 0 3px rgba(6,182,212,.1)}
        .role-opt .role-name{font-size:13px;font-weight:700;color:#0f172a}
        .role-opt .role-desc{font-size:11px;color:#94a3b8}

        .btn-submit{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#0891b2,#06b6d4);cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(6,182,212,.25)}
        .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(6,182,212,.35)}
        .link-row{text-align:center;margin-top:20px;font-size:13px;color:#64748b}
        .link-row a{color:#06b6d4;text-decoration:none;font-weight:600}
        .link-row a:hover{text-decoration:underline}
    </style>
</head>
<body>

<div class="reg-card">
    <div class="logo"><div class="logo-ic">S</div><span class="logo-tx">Smart<span>Healthcare</span></span></div>
    <h1>Tạo Tài Khoản</h1>
    <p class="sub">Tham gia hệ thống Y tế số thông minh.</p>
    <form id="registerForm">
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Họ và tên</label>
                <input type="text" id="regName" required class="form-input" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
                <label class="form-label">Số điện thoại</label>
                <input type="text" id="regPhone" class="form-input" placeholder="0901 234 567">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="regEmail" required class="form-input" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Mật khẩu</label>
            <div class="password-wrap">
                <input type="password" id="regPassword" required minlength="6" class="form-input" placeholder="Tối thiểu 6 ký tự">
                <button type="button" class="toggle-pass" data-target="regPassword" aria-label="Hiện/ẩn mật khẩu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Xác nhận mật khẩu</label>
            <div class="password-wrap">
                <input type="password" id="regConfirmPassword" required minlength="6" class="form-input" placeholder="Nhập lại mật khẩu">
                <button type="button" class="toggle-pass" data-target="regConfirmPassword" aria-label="Hiện/ẩn mật khẩu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Chọn vai trò</label>
            <div class="role-group">
                <div class="role-opt">
                    <input type="radio" name="role" value="PATIENT" id="rolePatient" checked>
                    <label for="rolePatient"><span class="role-name">Bệnh Nhân</span><span class="role-desc">Đặt lịch và khám bệnh</span></label>
                </div>
                <div class="role-opt">
                    <input type="radio" name="role" value="DOCTOR" id="roleDoctor">
                    <label for="roleDoctor"><span class="role-name">Bác Sĩ</span><span class="role-desc">Khám và kê đơn thuốc</span></label>
                </div>
            </div>
        </div>
        <button type="submit" class="btn-submit">Đăng Ký →</button>
    </form>
    <div class="link-row">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
</div>

<script>
    document.querySelectorAll('.toggle-pass').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = document.getElementById(btn.getAttribute('data-target'));
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                `;
            } else {
                input.type = 'password';
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                `;
            }
        });
    });


    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const role = document.querySelector('input[name="role"]:checked').value;
        const password = document.getElementById('regPassword').value;
        const confirmPassword = document.getElementById('regConfirmPassword').value;

        if (password !== confirmPassword) {
            Swal.fire({title:'Lỗi',text:'Mật khẩu xác nhận không khớp.',icon:'error',confirmButtonColor:'#06b6d4'});
            return;
        }

        try {
            const res = await fetch('/api/auth/register', {method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('regEmail').value,
                    password,
                    fullName: document.getElementById('regName').value,
                    phoneNumber: document.getElementById('regPhone').value,
                    role
                })
            });
            if (!res.ok) { const d = await res.json(); throw new Error(d.message || 'Đăng ký thất bại.'); }
            const data = await res.json();
            const msg = data.message || 'Đăng ký thành công! Chuyển đến trang đăng nhập...';
            Swal.fire({
                title: 'Đăng ký thành công!',
                text: msg,
                icon: 'success',
                confirmButtonColor: '#06b6d4'
            }).then(() => window.location.href = '/login');
        } catch(err) {
            Swal.fire({title:'Lỗi',text:err.message,icon:'error',confirmButtonColor:'#06b6d4'});
        }
    });
</script>
</body>
</html>
