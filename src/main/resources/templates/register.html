<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - Smart Healthcare</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen text-slate-800 flex items-center justify-center p-4">

    <!-- Card container -->
    <div class="w-full max-w-lg glass p-8 rounded-3xl shadow-2xl shadow-blue-500/10 space-y-6">
        
        <!-- Logo/Header -->
        <div class="text-center space-y-2">
            <a href="/" class="inline-flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-lg">
                    S
                </div>
                <span class="text-lg font-bold tracking-tight text-slate-900">Smart<span class="text-blue-600">Healthcare</span></span>
            </a>
            <h2 class="text-2xl font-bold tracking-tight text-slate-900">Tạo Tài Khoản Mới</h2>
            <p class="text-sm text-slate-500">Cùng đồng hành chăm sóc sức khỏe toàn diện</p>
        </div>

        <!-- Alerts -->
        <div id="errorAlert" class="hidden bg-rose-50 text-rose-600 p-4 rounded-2xl text-sm font-medium border border-rose-100 transition-all"></div>
        <div id="successAlert" class="hidden bg-emerald-50 text-emerald-600 p-4 rounded-2xl text-sm font-medium border border-emerald-100 transition-all"></div>

        <!-- Register Form -->
        <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="space-y-1 md:col-span-2">
                <label for="fullName" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Họ Và Tên</label>
                <input type="text" id="fullName" required
                       class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
                       placeholder="Nguyễn Văn A">
            </div>

            <div class="space-y-1">
                <label for="email" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Email</label>
                <input type="email" id="email" required
                       class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
                       placeholder="example@healthcare.com">
            </div>

            <div class="space-y-1">
                <label for="phoneNumber" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Số Điện Thoại</label>
                <input type="tel" id="phoneNumber" required
                       class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
                       placeholder="0912345678">
            </div>

            <div class="space-y-1">
                <label for="password" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Mật Khẩu</label>
                <input type="password" id="password" required
                       class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm"
                       placeholder="••••••••">
            </div>

            <div class="space-y-1">
                <label for="role" class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Bạn là ai?</label>
                <select id="role" required
                        class="w-full px-4 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                    <option value="PATIENT">Bệnh Nhân (Patient)</option>
                    <option value="DOCTOR">Bác Sĩ (Doctor)</option>
                </select>
            </div>

            <button type="submit"
                    class="md:col-span-2 w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-2xl shadow-lg shadow-blue-500/25 transition-all hover:-translate-y-0.5 active:translate-y-0 mt-2 text-sm">
                Đăng Ký
            </button>
        </form>

        <!-- Redirect to login -->
        <p class="text-center text-sm text-slate-500">
            Đã có tài khoản? 
            <a href="/login" class="text-blue-600 font-semibold hover:underline">Đăng nhập ngay</a>
        </p>

    </div>

    <!-- JS Logic -->
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.classList.add('hidden');
            successAlert.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ fullName, email, phoneNumber, password, role })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Lỗi đăng ký tài khoản!');
                }

                successAlert.textContent = 'Đăng ký tài khoản thành công! Đang chuyển hướng đến trang đăng nhập...';
                successAlert.classList.remove('hidden');

                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);

            } catch (err) {
                errorAlert.textContent = err.message;
                errorAlert.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
