spring.application.name=SmartHealthcarePlatform

# Database Configuration
# NOTE: Please change the username and password to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/smart_healthcare?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=002203Huylam!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging
logging.file.name=spring_boot_app.log
logging.level.org.thymeleaf=DEBUG
spring.thymeleaf.cache=false

# Advanced Security (Open Extension - Option 2)
app.security.jwt.secret=SmartHealthcarePlatformSecretKey1234567890SmartHealthcarePlatform
app.security.jwt.expiration-hours=10
app.security.login.max-failed-attempts=5
app.security.login.lock-minutes=15
app.security.cookie.name=jwt
app.security.cookie.secure=false
app.security.cookie.same-site=Strict
app.security.cookie.max-age-seconds=36000
